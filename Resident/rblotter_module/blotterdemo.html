<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="cssfile/blotterdemo.css" />
        <title>Barangay Blotter Form - Barangay Tugtug</title>
        <link rel="icon" href="photos/logo.png.png" />
        <style>
            /* Clear Button Styles */
            .btn-clear {
                background-color: #dc2626;
                color: white;
                border: none;
                padding: 8px 12px;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                transition: background 0.2s;
            }
            .btn-clear:hover {
                background-color: #991b1b;
            }
        </style>
    </head>
    <body>
        <button class="btn-back" onclick="history.back()">
            <img class="backbutton" src="photos/backbutton.png" />
            <label class="back">Back</label>
        </button>

        <div class="form-container">
            <div class="form-header">
                <img
                    class="Form-Logo"
                    src="photos/logo.png.png"
                    alt="Barangay Logo"
                />
                <div class="header-text-group">
                    <h1 class="titletop">Republic of the Philippines</h1>
                    <h1 class="titletop">PROVINCE OF BATANGAS</h1>
                    <h1 class="titletop">Municipality of San Jose</h1>
                    <h1 id="title">Barangay Tugtug</h1>
                    <h2 class="office-title">OFFICE OF THE PUNONG BARANGAY</h2>
                </div>
            </div>

            <h2 id="lastline">BARANGAY BLOTTER</h2>

            <form
                id="blotterForm"
                class="complaint-form"
                action="php/submit_blotter.php"
                method="POST"
                enctype="multipart/form-data"
            >
                <div class="row">
                    <div class="form-group">
                        <label
                            >FIRST NAME <span class="required">*</span></label
                        >
                        <input
                            type="text"
                            name="first_name"
                            placeholder="e.g. Juan"
                            required
                            pattern="[A-Za-z\s.]+"
                            title="Letters only"
                        />
                    </div>
                    <div class="form-group">
                        <label>LAST NAME <span class="required">*</span></label>
                        <input
                            type="text"
                            name="last_name"
                            placeholder="e.g. Dela Cruz"
                            required
                            pattern="[A-Za-z\s.]+"
                            title="Letters only"
                        />
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>MIDDLE NAME</label>
                        <input
                            type="text"
                            name="middle_name"
                            placeholder="e.g. Santos"
                            pattern="[A-Za-z\s.]+"
                        />
                    </div>
                    <div class="form-group">
                        <label>SUFFIX</label>
                        <select name="suffix">
                            <option value="">— None —</option>
                            <option value="Jr.">Jr.</option>
                            <option value="Sr.">Sr.</option>
                            <option value="II">II</option>
                            <option value="III">III</option>
                            <option value="IV">IV</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>AGE <span class="required">*</span></label>
                        <input
                            type="number"
                            name="age"
                            min="1"
                            max="120"
                            placeholder="0"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label
                            >CIVIL STATUS <span class="required">*</span></label
                        >
                        <select name="civil_status" required>
                            <option value="">— Select —</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Widowed">Widowed</option>
                            <option value="Separated">Separated</option>
                            <option value="Annulled">Annulled</option>
                        </select>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>ADDRESS <span class="required">*</span></label>
                    <input type="text" name="address" required />
                </div>

                <div class="form-group full-width">
                    <label>OCCUPATION <span class="required">*</span></label>
                    <input type="text" name="occupation" required />
                </div>

                <hr class="divider" />

                <div class="row">
                    <div class="form-group">
                        <label
                            >PETSA (DATE) <span class="required">*</span></label
                        >
                        <input
                            type="date"
                            name="incident_date"
                            id="incident_date"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label
                            >ORAS (TIME) <span class="required">*</span></label
                        >
                        <input type="time" name="incident_time" required />
                    </div>
                </div>

                <div class="form-group full-width">
                    <label
                        >PERSON COMPLAINED AGAINST
                        <span class="required">*</span></label
                    >
                    <input type="text" name="complaint_against" required />
                </div>

                <div class="form-group full-width">
                    <label
                        >COMPLAINT TYPE <span class="required">*</span></label
                    >
                    <select name="complaint_type" required>
                        <option value="">— Select Type —</option>
                        <option value="Physical Assault">
                            Physical Assault
                        </option>
                        <option value="Verbal Abuse">Verbal Abuse</option>
                        <option value="Property Dispute">
                            Property Dispute
                        </option>
                        <option value="Theft">Theft</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label
                        >NATURE OF COMPLAINT
                        <span class="required">*</span></label
                    >
                    <textarea
                        name="complaint_details"
                        rows="4"
                        required
                    ></textarea>
                </div>

                <div class="form-group full-width">
                    <label
                        >UPLOAD VALID ID <span class="required">*</span></label
                    >
                    <div
                        class="file-input-wrapper"
                        style="display: flex; gap: 10px; align-items: center"
                    >
                        <input
                            type="file"
                            name="id_image"
                            id="id_image"
                            accept="image/*"
                            required
                            style="flex-grow: 1"
                        />
                        <button
                            type="button"
                            id="clear-file"
                            class="btn-clear"
                            style="display: none"
                        >
                            Clear
                        </button>
                    </div>
                    <p class="field-hint">
                        Upload a clear photo for identity verification.
                    </p>
                </div>

                <div
                    class="privacy-note"
                    style="
                        margin: 20px 0;
                        padding: 15px;
                        background: #f9f9f9;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                    "
                >
                    <div
                        style="
                            display: flex;
                            align-items: flex-start;
                            gap: 10px;
                        "
                    >
                        <input
                            type="checkbox"
                            id="privacy_agree"
                            name="privacy_agree"
                            required
                        />
                        <label
                            for="privacy_agree"
                            style="
                                font-size: 0.85rem;
                                color: #333;
                                cursor: pointer;
                            "
                        >
                            <strong>Data Privacy Notice:</strong> I agree to the
                            collection and processing of my personal data by
                            Barangay Tugtug for blotter filing in compliance
                            with the Data Privacy Act of 2012.
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">
                        Submit Blotter Report
                    </button>
                </div>
            </form>
        </div>

        <script>
            window.onload = function () {
                // 1. Prevent Future Dates for Incident
                const dateInput = document.getElementById("incident_date");
                const today = new Date().toISOString().split("T")[0];
                dateInput.setAttribute("max", today);

                // 2. Image Upload & Clear Logic
                const fileInput = document.getElementById("id_image");
                const clearBtn = document.getElementById("clear-file");

                fileInput.onchange = function () {
                    if (this.files && this.files.length > 0) {
                        clearBtn.style.display = "inline-block";
                    } else {
                        clearBtn.style.display = "none";
                    }
                };

                clearBtn.onclick = function () {
                    fileInput.value = "";
                    this.style.display = "none";
                };

                // 3. Handle Error Alerts from URL
                const urlParams = new URLSearchParams(window.location.search);
                const error = urlParams.get("error");

                if (error) {
                    let message = "An error occurred.";
                    if (error === "name_numbers")
                        message = "Error: Names cannot contain numbers.";
                    else if (error === "upload_fail")
                        message = "Error: Failed to upload ID image.";
                    else if (error === "db_fail")
                        message = "Database Error: Could not save the record.";

                    alert(message);
                    // Clear the error from URL after alerting
                    window.history.replaceState(
                        {},
                        document.title,
                        window.location.pathname,
                    );
                }
            };
        </script>
    </body>
</html>
