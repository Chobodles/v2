<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Submission Successful | Barangay Tugtug</title>
        <link rel="stylesheet" href="cssfile/blotterthankyou.css" />
    </head>
    <body>
        <div class="thank-you-container">
            <div class="success-icon">✔️</div>
            <h1>THANK YOU!</h1>
            <p>Your information has been successfully recorded.</p>

            <div class="ref-box">
                <span class="ref-label">REFERENCE NUMBER</span>
                <h2 id="ref-number">LOADING...</h2>
            </div>

            <div class="form-actions">
                <button
                    onclick="
                        window.location.href =
                            '../select_module/residentchoice.html'
                    "
                    class="home-btn"
                >
                    Back to Home
                </button>
            </div>
        </div>

        <script>
            window.onload = function () {
                const urlParams = new URLSearchParams(window.location.search);
                const refNum = urlParams.get("ref");

                if (refNum) {
                    document.getElementById("ref-number").innerText = refNum;
                } else {
                    document.getElementById("ref-number").innerText =
                        "NOT FOUND";
                }
            };
        </script>
    </body>
</html>
